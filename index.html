<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diaqnostika Paneli</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { 
            font-family: sans-serif; 
            background: #1a1a1a; 
            color: white; 
            text-align: center; 
            padding: 20px; 
            margin: 0;
        }
        .box { 
            background: #2d2d2d; 
            padding: 20px; 
            border-radius: 15px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.5); 
        }
        input { 
            width: 100%; 
            padding: 12px; 
            margin: 10px 0; 
            border-radius: 8px; 
            border: none; 
            box-sizing: border-box; 
            font-size: 16px; 
            background: #404040;
            color: white;
        }
        input::placeholder {
            color: #aaa;
        }
        button { 
            width: 100%; 
            padding: 15px; 
            background: #0088cc; 
            border: none; 
            color: white; 
            border-radius: 10px; 
            font-weight: bold; 
            font-size: 18px; 
            margin-top: 10px;
            cursor: pointer;
        }
        button:active {
            background: #006699;
        }
    </style>
</head>
<body>
    <div class="box">
        <h2>📊 DİAQNOSTİKA PANELİ</h2>
        <input type="text" id="name" placeholder="Müştəri Adı">
        <input type="text" id="car" placeholder="Avtomobil (Məs: Prius 30)">
        <input type="text" id="fault" placeholder="Xəta Kodu (Məs: P0420)">
        <button id="btn">HESABATI HAZIRLA</button>
    </div>
    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        
        document.getElementById("btn").onclick = function() {
            let name = document.getElementById("name").value;
            let car = document.getElementById("car").value;
            let fault = document.getElementById("fault").value;

            if(!name || !car || !fault) {
                alert("Zəhmət olmasa bütün xanaları doldurun!");
                return;
            }

            let data = {
                client_name: name,
                car_info: car,
                fault_code: fault
            };
            
            tg.sendData(JSON.stringify(data));
            tg.close();
        };
    </script>
</body>
</html>
